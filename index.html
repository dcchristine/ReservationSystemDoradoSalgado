<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Dorado Salgado Reservation System</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f5f0e8;
            color: #1f2a44;
        }
        main {
            max-width: 560px;
            padding: 32px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 18px 45px rgba(31, 42, 68, 0.15);
            text-align: center;
        }
        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }
        p {
            line-height: 1.6;
            color: #5f6470;
        }
        a {
            display: inline-block;
            margin-top: 14px;
            padding: 12px 18px;
            border-radius: 6px;
            background: #b98b3f;
            color: white;
            text-decoration: none;
            font-weight: 700;
        }
        code {
            background: #f1f1f1;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <main>
        <h1>Dorado Salgado Reservation System</h1>
        <p>This is a PHP/MySQL MVC project, so it must be opened through a local server. Double-click <code>RUN_APP.bat</code>, or start Laragon/XAMPP and use the localhost link.</p>
        <a href="http://localhost/MVCReservationSystemDoradoSalgado/">Open With Localhost</a>
    </main>
</body>
</html>
